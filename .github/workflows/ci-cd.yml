name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # Автоматически: ghcr.io/username/task-tracker
  IMAGE_NAME: ${{ github.repository }}

# ── Job 1: Tests ───────────────────────────────────────────────────────────────
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       tasktracker_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        env:
          SECRET_KEY:    "ci-test-secret-key-not-for-production"
          DB_NAME:       tasktracker_test
          DB_USER:       postgres
          DB_PASSWORD:   postgres
          DB_HOST:       localhost
          DB_PORT:       "5432"
        run: python -m alembic upgrade head

      - name: Check app imports (smoke test)
        env:
          SECRET_KEY:    "ci-test-secret-key-not-for-production"
          DB_NAME:       tasktracker_test
          DB_USER:       postgres
          DB_PASSWORD:   postgres
          DB_HOST:       localhost
          DB_PORT:       "5432"
        run: python -c "from app.main import app; print('FastAPI app loaded OK')"

# ── Job 2: Build & Push Docker image ─────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    # Только при пуше в main (не при PR)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write   # нужно для записи в GHCR

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # sha-abc1234 — уникальный тег для каждого коммита
            type=sha,prefix=sha-
            # latest — всегда указывает на последний коммит main
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          target: production
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions Cache — ускоряет повторные сборки
          cache-from: type=gha
          cache-to:   type=gha,mode=max

# ── Job 3: Deploy to production server ───────────────────────────────────────
  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Защита: требует ручного подтверждения в настройках репозитория
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     ${{ secrets.SSH_PORT || 22 }}
          # Скрипт выполняется на удалённом сервере
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "==> Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "==> Logging in to GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "==> Pulling new web image..."
            docker compose pull web

            echo "==> Ensuring dependencies are running..."
            docker compose up -d db redis

            echo "==> Waiting for database to be healthy..."
            timeout 60 sh -c 'until docker compose ps db | grep -q healthy; do sleep 2; done' \
              || { echo "Database did not become healthy in time"; exit 1; }

            echo "==> Waiting for Redis to be healthy..."
            timeout 30 sh -c 'until docker compose ps redis | grep -q healthy; do sleep 2; done' \
              || { echo "Redis did not become healthy in time"; exit 1; }

            echo "==> Starting new container (zero-downtime)..."
            docker compose up -d --no-deps --wait web

            echo "==> Setting up SSL certificate..."
            if ! docker compose exec -T nginx test -f /etc/letsencrypt/live/ddssrd.xyz/fullchain.pem 2>/dev/null; then
              echo "==> Obtaining new SSL certificate from Let's Encrypt..."
              docker compose run --rm certbot certonly --webroot \
                -w /var/www/certbot \
                -d ddssrd.xyz -d www.ddssrd.xyz \
                --email samudinovilim.d@gmail.com \
                --agree-tos --no-eff-email --non-interactive
            else
              echo "==> Renewing SSL certificate (if needed)..."
              docker compose run --rm certbot renew --quiet
            fi

            echo "==> Activating HTTPS config (first time only)..."
            cp -n nginx/conf.d/ssl.conf.template nginx/conf.d/ssl.conf 2>/dev/null || true

            echo "==> Reloading nginx config..."
            docker compose exec -T nginx nginx -s reload

            echo "==> Removing unused images..."
            docker image prune -f

            echo "==> Deployment complete!"
            docker compose ps

# ── Secrets, которые нужно добавить в Settings → Secrets → Actions: ──────────
# SSH_HOST          — IP или домен сервера
# SSH_USER          — пользователь на сервере (например: deploy)
# SSH_PRIVATE_KEY   — приватный SSH-ключ (содержимое ~/.ssh/id_ed25519)
# SSH_PORT          — SSH-порт (обычно 22)
# DEPLOY_PATH       — путь к проекту на сервере (/home/deploy/task-tracker)
