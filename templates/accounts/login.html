{% extends 'base.html' %}

{% block title %}Вход — Менеджер задач{% endblock %}

{% block auth_content %}
<div class="login-page d-flex align-items-center justify-content-center min-vh-100">
  <div class="login-card card shadow-lg border-0">
    <div class="card-body p-5">
      <div class="text-center mb-5">
        <div class="login-logo mb-3">
          <i class="bi bi-kanban-fill"></i>
        </div>
        <h3 class="fw-bold">Менеджер задач</h3>
        <p class="text-muted">Система управления задачами</p>
      </div>

      {% if reason == 'timeout' %}
        <div class="alert alert-warning">Сессия истекла из-за бездействия. Войдите снова.</div>
      {% endif %}

      <form method="post" novalidate>

        <div class="mb-4">
          <label class="form-label">Логин</label>
          <input type="text" name="username" class="form-control form-control-lg"
                 placeholder="Введите логин" autofocus
                 value="{{ username_value or '' }}">
        </div>

        <div class="mb-4">
          <label class="form-label">Пароль</label>
          <input type="password" name="password" class="form-control form-control-lg"
                 placeholder="Введите пароль">
        </div>

        {% if error %}
          <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <div class="mb-4 form-check">
          <input type="checkbox" name="remember_me" class="form-check-input" id="id_remember_me">
          <label class="form-check-label" for="id_remember_me">Запомнить меня</label>
        </div>

        <button type="submit" class="btn btn-primary w-100 btn-lg">
          <i class="bi bi-box-arrow-in-right me-2"></i>Войти
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
