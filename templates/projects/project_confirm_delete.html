{% extends 'base.html' %}

{% block title %}Удалить проект{% endblock %}
{% block page_title %}Удалить проект{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5 col-md-7">
    <div class="card" style="border-color:#fecaca">
      <div class="card-body p-5 text-center">
        <div class="mx-auto mb-4 d-flex align-items-center justify-content-center"
             style="width:56px;height:56px;border-radius:50%;background:#fff1f2">
          <i class="bi bi-trash" style="font-size:1.5rem;color:#ef4444"></i>
        </div>
        <h5 class="fw-bold mb-2" style="font-size:1rem">Удалить проект?</h5>
        <p class="text-muted mb-4" style="font-size:.825rem">
          «<strong style="color:var(--text)">{{ project.name }}</strong>» — все задачи, комментарии и файлы будут удалены. Это действие нельзя отменить.
        </p>
        <form method="post" class="d-flex gap-2 justify-content-center">
          <button type="submit" class="btn btn-sm" style="background:#ef4444;border-color:#ef4444;color:#fff">
            <i class="bi bi-trash me-1"></i>Удалить
          </button>
          <a href="{{ url_for('project_list') }}" class="btn btn-sm btn-ghost">Отмена</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
