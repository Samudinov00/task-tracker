{% extends 'base.html' %}

{% block title %}Удалить проект{% endblock %}
{% block page_title %}Удалить проект{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card shadow-sm border-danger">
      <div class="card-body p-4 text-center">
        <i class="bi bi-exclamation-triangle-fill text-danger fs-1 mb-3 d-block"></i>
        <h5>Удалить проект «{{ project.name }}»?</h5>
        <p class="text-muted mb-4">
          Будут удалены все файлы и комментарии проекта.
          Это действие нельзя отменить.
        </p>
        <form method="post">
          <button type="submit" class="btn btn-danger me-2">
            <i class="bi bi-trash me-1"></i>Удалить
          </button>
          <a href="{{ url_for('project_list') }}" class="btn btn-outline-secondary">
            Отмена
          </a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
