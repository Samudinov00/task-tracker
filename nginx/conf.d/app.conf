# Upstream — Django/Gunicorn
upstream django {
    server web:8000;
    keepalive 32;
}

# ── Healthcheck endpoint (для Docker healthcheck nginx) ──────────────────────
server {
    listen 80;
    server_name _;

    location /health/ {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }
}

# ── HTTP → основной сервер ───────────────────────────────────────────────────
server {
    listen 80;
    # ⚠ Замените на ваш домен:
    server_name example.com www.example.com;

    # ACME-challenge для Certbot (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # После получения сертификата — раскомментируйте редирект:
    # return 301 https://$host$request_uri;

    # ── Статические файлы (Django collectstatic) ─────────────────────────────
    location /static/ {
        alias   /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Медиафайлы ──────────────────────────────────────────────────────────
    location /media/ {
        alias   /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Проксирование на Django ──────────────────────────────────────────────
    location / {
        proxy_pass          http://django;

        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Connection        "";
        proxy_http_version  1.1;

        proxy_redirect      off;
        proxy_buffering     on;
        proxy_buffer_size   8k;
        proxy_buffers       8 8k;
        proxy_read_timeout  60s;
        proxy_connect_timeout 10s;
    }
}

