# Upstream — Django/Gunicorn
upstream django {
    server web:8000;
    keepalive 32;
}

# ── Healthcheck endpoint (для Docker healthcheck nginx) ──────────────────────
server {
    listen 80;
    server_name _;

    location /health/ {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }
}

# ── HTTP → HTTPS redirect + ACME-challenge ───────────────────────────────────
server {
    listen 80;
    server_name ddssrd.xyz www.ddssrd.xyz;

    # ACME-challenge для Certbot (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Всё остальное — редирект на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
